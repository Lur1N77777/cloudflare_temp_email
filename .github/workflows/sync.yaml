name: Upstream Sync

on:
  schedule:
    # 每天 03:00（Asia/Shanghai）检查上游更新。
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Merge upstream changes
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/dreamhunter2333/cloudflare_temp_email.git
          git fetch upstream main

          ours_commit="$(git rev-parse HEAD)"
          set +e
          git merge --no-commit --no-ff upstream/main
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            echo "Merge conflict detected. Preserving local GitHub Actions automation files and retrying."
          fi

          # Keep this fork's workflow files. GitHub's default GITHUB_TOKEN cannot
          # push upstream workflow-file changes without the extra workflow scope,
          # and these files also contain local deployment/secrets write-back logic.
          if git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            for file in $(git ls-files .github/workflows); do
              if ! git cat-file -e "$ours_commit:$file" 2>/dev/null; then
                git rm -f "$file"
              fi
            done
            git checkout "$ours_commit" -- .github/workflows
            git add .github/workflows

            protected_paths=(
              ".github/scripts/render-worker-toml.py"
              "docs/github-actions-auto-deploy.md"
              "vitepress-docs/docs/zh/guide/actions/github-action.md"
              "vitepress-docs/docs/en/guide/actions/github-action.md"
              "CHANGELOG.md"
              "CHANGELOG_EN.md"
            )
            for path in "${protected_paths[@]}"; do
              if git cat-file -e "$ours_commit:$path" 2>/dev/null; then
                git checkout "$ours_commit" -- "$path"
                git add "$path"
              fi
            done

            if git diff --name-only --diff-filter=U | grep -q .; then
              echo "Unresolved conflicts remain:"
              git diff --name-only --diff-filter=U
              exit 1
            fi

            git commit --no-edit
            git push origin HEAD:main
          else
            echo "Already up to date."
          fi

          echo "Triggering backend and frontend deployments on main."
          gh workflow run backend_deploy.yaml --ref main
          gh workflow run frontend_deploy.yaml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
