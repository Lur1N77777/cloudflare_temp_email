name: Build Docs

on:
  workflow_run:
    workflows: ["Tag Build CI"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false

      - name: Build verified docs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          cd vitepress-docs/
          if [ -n "${WORKFLOW_RUN_HEAD_BRANCH:-}" ]; then
            TAG_NAME="$WORKFLOW_RUN_HEAD_BRANCH"
          elif TAG_NAME=$(gh release view --json tagName --jq '.tagName' 2>/dev/null); then
            echo "Using release tag $TAG_NAME"
          else
            echo "A published release is required to build the documentation artifact."
            exit 1
          fi
          mkdir -p .release-assets
          gh release download "$TAG_NAME" --pattern frontend.zip --pattern SHA256SUMS.txt --dir .release-assets
          (
            cd .release-assets
            grep -E '^[0-9a-fA-F]{64}[[:space:]]+frontend\.zip$' SHA256SUMS.txt | sha256sum --check --strict -
          )
          cp .release-assets/frontend.zip docs/public/ui_install/frontend.zip
          pnpm install --frozen-lockfile
          TAG_NAME="$TAG_NAME" pnpm run build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-${{ github.event.workflow_run.head_branch || github.ref_name }}
          path: vitepress-docs/docs/.vitepress/dist
          retention-days: 14
