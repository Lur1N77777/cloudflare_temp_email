name: Deploy Frontend

on:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Deploy Frontend for ${{ github.ref_name }}
        if: ${{ env.FRONTEND_NAME != '' }}
        run: |
          cd frontend/
          pnpm install --no-frozen-lockfile
          if [ -n "$FRONTEND_ENV_CONTENT" ]; then
            printf '%s\n' "$FRONTEND_ENV_CONTENT" > .env.prod
          else
            api_base="$TEMP_MAIL_FRONTEND_API_BASE"
            if [ -z "$api_base" ] && [ -n "$TEMP_MAIL_WORKER_ROUTE" ]; then
              api_base="https://$TEMP_MAIL_WORKER_ROUTE"
            fi
            if [ -z "$api_base" ]; then
              echo "FRONTEND_ENV is not set and TEMP_MAIL_FRONTEND_API_BASE/TEMP_MAIL_WORKER_ROUTE is empty."
              echo "Please set FRONTEND_ENV secret or TEMP_MAIL_FRONTEND_API_BASE repository variable."
              exit 1
            fi
            printf 'VITE_API_BASE=%s\nVITE_CF_WEB_ANALY_TOKEN=%s\nVITE_IS_TELEGRAM=false\n' "$api_base" "$VITE_CF_WEB_ANALY_TOKEN" > .env.prod
          fi
          echo "Frontend env preview:"
          sed -E 's/(TOKEN=).*/\1/' .env.prod
          pnpm exec wrangler pages project create "$FRONTEND_NAME" --production-branch production || true
          export frontend_branch="$FRONTEND_BRANCH"
          if [ -n "$frontend_branch" ]; then
            echo "Deploying branch $frontend_branch"
            pnpm run deploy:actions --project-name=$FRONTEND_NAME --branch $frontend_branch
          else
            echo "Deploying branch production"
            pnpm run deploy --project-name=$FRONTEND_NAME
          fi
          echo "Deployed for tag ${{ github.ref_name }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          FRONTEND_NAME: ${{ secrets.FRONTEND_NAME || vars.TEMP_MAIL_FRONTEND_NAME || 'cloudflare-temp-email' }}
          FRONTEND_ENV_CONTENT: ${{ secrets.FRONTEND_ENV }}
          FRONTEND_BRANCH: ${{ secrets.FRONTEND_BRANCH || vars.FRONTEND_BRANCH }}
          TEMP_MAIL_FRONTEND_API_BASE: ${{ vars.TEMP_MAIL_FRONTEND_API_BASE }}
          TEMP_MAIL_WORKER_ROUTE: ${{ vars.TEMP_MAIL_WORKER_ROUTE }}
          VITE_CF_WEB_ANALY_TOKEN: ${{ secrets.VITE_CF_WEB_ANALY_TOKEN || vars.VITE_CF_WEB_ANALY_TOKEN }}

  deploy-telegram-frontend:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Deploy Telegram Frontend for ${{ github.ref_name }}
        if: ${{ env.TG_FRONTEND_NAME != '' }}
        run: |
          cd frontend/
          echo "${{ secrets.FRONTEND_ENV }}" > .env.prod
          pnpm install --no-frozen-lockfile
          export frontend_branch="${{ secrets.FRONTEND_BRANCH }}"
          if [ -n "$frontend_branch" ]; then
            echo "Deploying telegram mini app branch $frontend_branch"
            pnpm run deploy:actions:telegram --project-name=$TG_FRONTEND_NAME --branch $frontend_branch
          else
            echo "Deploying telegram mini app branch production"
            pnpm run deploy:telegram --project-name=$TG_FRONTEND_NAME
          fi
          echo "Deployed telegram mini app for ${{ github.ref_name }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TG_FRONTEND_NAME: ${{ secrets.TG_FRONTEND_NAME }}
