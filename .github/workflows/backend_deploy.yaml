name: Deploy Backend

on:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false

      - name: Deploy Backend for ${{ github.ref_name }}
        run: |
          export use_worker_assets="$USE_WORKER_ASSETS"
          export use_worker_assets_with_telegram="$USE_WORKER_ASSETS_WITH_TELEGRAM"

          if [ -n "$use_worker_assets" ]; then
            cd frontend/
            pnpm install --no-frozen-lockfile
            if [ -n "$use_worker_assets_with_telegram" ]; then
              echo "Building with telegram pages"
              pnpm build:telegram:pages
            else
              echo "Building with normal pages"
              pnpm build:pages
            fi
            cd ..
          fi

          export debug_mode=${{ secrets.DEBUG_MODE }}
          export use_mail_wasm_parser=${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}

          if [ -n "$WRANGLER_TOML_CONTENT" ]; then
            echo "Using BACKEND_TOML secret for worker/wrangler.toml"
            printf '%s\n' "$WRANGLER_TOML_CONTENT" > worker/wrangler.toml
          else
            echo "BACKEND_TOML secret is not set, rendering worker/wrangler.toml from repository variables"
            D1_NAME="${TEMP_MAIL_D1_NAME:-cloudflare_temp_email}"
            echo "Resolving D1 database: $D1_NAME"
            D1_LIST="$(curl -fsS \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database")"
            D1_DATABASE_ID="$(printf '%s' "$D1_LIST" | jq -r --arg NAME "$D1_NAME" '.result[]? | select(.name == $NAME) | .uuid' | head -n 1)"
            if [ -z "$D1_DATABASE_ID" ] || [ "$D1_DATABASE_ID" = "null" ]; then
              D1_COUNT="$(printf '%s' "$D1_LIST" | jq '.result | length')"
              if [ "$D1_COUNT" = "1" ]; then
                D1_DATABASE_ID="$(printf '%s' "$D1_LIST" | jq -r '.result[0].uuid')"
                D1_NAME="$(printf '%s' "$D1_LIST" | jq -r '.result[0].name')"
                echo "TEMP_MAIL_D1_NAME did not match, using the only D1 database in this account: $D1_NAME"
              elif [ "$D1_COUNT" = "0" ]; then
                echo "No D1 database found. Creating $D1_NAME"
                D1_CREATE="$(curl -fsS -X POST \
                  -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                  -H "Content-Type: application/json" \
                  --data "{\"name\":\"$D1_NAME\"}" \
                  "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database")"
                D1_DATABASE_ID="$(printf '%s' "$D1_CREATE" | jq -r '.result.uuid')"
              else
                echo "Multiple D1 databases found, but none named '$D1_NAME'."
                echo "Please set repository variable TEMP_MAIL_D1_NAME to the existing database name."
                printf '%s' "$D1_LIST" | jq -r '.result[] | "- " + .name + " (" + .uuid + ")"'
                exit 1
              fi
            fi
            export D1_DATABASE_ID
            export D1_DATABASE_NAME="$D1_NAME"
            python .github/scripts/render-worker-toml.py > worker/wrangler.toml
          fi

          cd worker/
          echo "Generated wrangler.toml preview without sensitive values:"
          grep -vE 'JWT_SECRET|ADMIN_PASSWORDS|PASSWORDS' wrangler.toml

          pnpm install --no-frozen-lockfile

          if [ -n "$use_mail_wasm_parser" ]; then
            echo "Using mail-parser-wasm-worker"
            pnpm add mail-parser-wasm-worker
            git apply ../.github/config/mail-parser-wasm-worker.patch
            echo "Applied mail-parser-wasm-worker patch"
          fi

          if [ "$debug_mode" = "true" ]; then
            pnpm run deploy
          else
            if pnpm run deploy >/dev/null 2>&1; then
              echo "Deploy succeeded"
            else
              code=$?
              echo "Command failed with exit code $code"
              exit "$code"
            fi
          fi
          echo "Deployed for tag ${{ github.ref_name }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
          USE_WORKER_ASSETS: ${{ secrets.USE_WORKER_ASSETS || vars.USE_WORKER_ASSETS }}
          USE_WORKER_ASSETS_WITH_TELEGRAM: ${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM || vars.USE_WORKER_ASSETS_WITH_TELEGRAM }}
          TEMP_MAIL_WORKER_NAME: ${{ vars.TEMP_MAIL_WORKER_NAME }}
          TEMP_MAIL_WORKER_ROUTE: ${{ vars.TEMP_MAIL_WORKER_ROUTE }}
          TEMP_MAIL_D1_NAME: ${{ vars.TEMP_MAIL_D1_NAME }}
          TEMP_MAIL_DOMAINS_JSON: ${{ vars.TEMP_MAIL_DOMAINS_JSON }}
          TEMP_MAIL_DEFAULT_DOMAINS_JSON: ${{ vars.TEMP_MAIL_DEFAULT_DOMAINS_JSON }}
          TEMP_MAIL_RANDOM_SUBDOMAIN_DOMAINS_JSON: ${{ vars.TEMP_MAIL_RANDOM_SUBDOMAIN_DOMAINS_JSON }}
          TEMP_MAIL_DOMAIN_LABELS_JSON: ${{ vars.TEMP_MAIL_DOMAIN_LABELS_JSON }}
          TEMP_MAIL_USER_ROLES_JSON: ${{ vars.TEMP_MAIL_USER_ROLES_JSON }}
          TEMP_MAIL_PREFIX: ${{ vars.TEMP_MAIL_PREFIX }}
          TEMP_MAIL_RANDOM_SUBDOMAIN_LENGTH: ${{ vars.TEMP_MAIL_RANDOM_SUBDOMAIN_LENGTH }}
          TEMP_MAIL_ENABLE_CREATE_ADDRESS_SUBDOMAIN_MATCH: ${{ vars.TEMP_MAIL_ENABLE_CREATE_ADDRESS_SUBDOMAIN_MATCH }}
          TEMP_MAIL_ENABLE_USER_CREATE_EMAIL: ${{ vars.TEMP_MAIL_ENABLE_USER_CREATE_EMAIL }}
          TEMP_MAIL_ENABLE_USER_DELETE_EMAIL: ${{ vars.TEMP_MAIL_ENABLE_USER_DELETE_EMAIL }}
          TEMP_MAIL_ENABLE_ADDRESS_PASSWORD: ${{ vars.TEMP_MAIL_ENABLE_ADDRESS_PASSWORD }}
          TEMP_MAIL_DISABLE_SHOW_GITHUB: ${{ vars.TEMP_MAIL_DISABLE_SHOW_GITHUB }}
          TEMP_MAIL_USER_DEFAULT_ROLE: ${{ vars.TEMP_MAIL_USER_DEFAULT_ROLE }}
          TEMP_MAIL_NO_LIMIT_SEND_ROLE: ${{ vars.TEMP_MAIL_NO_LIMIT_SEND_ROLE }}
          TEMP_MAIL_ENABLE_SEND_MAIL_BINDING: ${{ vars.TEMP_MAIL_ENABLE_SEND_MAIL_BINDING }}
          TEMP_MAIL_SEND_MAIL_REMOTE: ${{ vars.TEMP_MAIL_SEND_MAIL_REMOTE }}
          TEMP_MAIL_SEND_MAIL_DOMAINS_JSON: ${{ vars.TEMP_MAIL_SEND_MAIL_DOMAINS_JSON }}
          TEMP_MAIL_FRONTEND_URL: ${{ vars.TEMP_MAIL_FRONTEND_URL }}
          TEMP_MAIL_CRON: ${{ vars.TEMP_MAIL_CRON }}
          TEMP_MAIL_KV_ID: ${{ secrets.TEMP_MAIL_KV_ID }}
          TEMP_MAIL_JWT_SECRET: ${{ secrets.TEMP_MAIL_JWT_SECRET }}
          TEMP_MAIL_ADMIN_PASSWORDS_JSON: ${{ secrets.TEMP_MAIL_ADMIN_PASSWORDS_JSON }}
          TEMP_MAIL_PASSWORDS_JSON: ${{ secrets.TEMP_MAIL_PASSWORDS_JSON }}
